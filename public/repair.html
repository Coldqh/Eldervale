<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111813" />
    <title>Восстановление Eldervale</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100dvh; display: grid; place-items: center; padding: 24px; color: #ece4cf; background: radial-gradient(circle at 50% 10%, #26382b, #0b110d 62%); }
      main { width: min(520px, 100%); padding: 28px; border: 1px solid rgba(226,207,157,.28); border-radius: 18px; background: rgba(18,28,21,.94); box-shadow: 0 28px 80px rgba(0,0,0,.45); text-align: center; }
      .sigil { width: 64px; height: 72px; margin: 0 auto 18px; display: grid; place-items: center; border: 1px solid #d6b56d; color: #ead9a9; font: 38px Georgia, serif; clip-path: polygon(50% 0,95% 18%,87% 77%,50% 100%,13% 77%,5% 18%); }
      h1 { margin: 0; color: #ead9a9; font: 500 28px Georgia, serif; }
      p { margin: 12px 0 0; color: #9f9f8f; line-height: 1.55; font-size: 14px; }
      small { display: block; margin-top: 16px; color: #69736b; }
      button { width: 100%; margin-top: 20px; padding: 13px 16px; border: 1px solid rgba(229,198,126,.4); border-radius: 12px; color: #fff0c9; background: linear-gradient(120deg, #806b3f, #4a6247); font: 17px Georgia, serif; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <div class="sigil">E</div>
      <h1>Восстановление приложения</h1>
      <p id="status">Удаляем старый кэш и отключаем сломанный Service Worker. Сохранённый мир не удаляется.</p>
      <button id="retry" hidden>Повторить восстановление</button>
      <small>После очистки Eldervale откроется автоматически.</small>
    </main>
    <script>
      const status = document.getElementById('status');
      const retry = document.getElementById('retry');

      async function repair() {
        retry.hidden = true;
        status.textContent = 'Удаляем старый кэш и отключаем сломанный Service Worker. Сохранённый мир не удаляется.';
        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(registration => registration.unregister()));
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.filter(key => key.startsWith('eldervale-')).map(key => caches.delete(key)));
          }
          const target = new URL('/Eldervale/', window.location.origin);
          target.searchParams.set('восстановлено', String(Date.now()));
          window.location.replace(target.toString());
        } catch (error) {
          status.textContent = 'Автоматическая очистка не завершилась. Нажми кнопку ещё раз.';
          retry.hidden = false;
        }
      }

      retry.addEventListener('click', repair);
      void repair();
    </script>
  </body>
</html>
