name: Deploy Eldervale

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          registry-url: https://registry.npmjs.org/

      - name: Pin stable npm
        run: npm install --global npm@10.9.3 --no-audit --no-fund

      - name: Verify package sources
        shell: bash
        run: |
          node --version
          npm --version
          npm config get registry
          if grep -R "applied-caas-gateway" package-lock.json; then
            echo "Internal registry URL found in package-lock.json"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-online
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

      - name: Simulation invariants
        run: npm run test:sim

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
